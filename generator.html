<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор команд</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            user-select: none;
        }
        .team {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #fff;
        }
        .team h3 {
            margin-top: 0;
        }
        @media screen and (max-width: 768px) {
            button {
                padding: 20px 20px;
                width: 100%;
                font-size: 20px;
            }
            h1 {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>

<h1>Генератор команд</h1>

<textarea id="playerInput" placeholder="Введите имена игроков, каждое с новой строки..."></textarea>
<button onclick="generateTeams()">Сгенерировать команды</button>

<div id="teamsOutput"></div>

<script>
    function generateTeams() {
        const input = document.getElementById('playerInput').value;
        let players = input.split('\n').map(name => name.trim()).filter(name => name !== '');

        const outputDiv = document.getElementById('teamsOutput');
        outputDiv.innerHTML = '';

        if (players.length === 0) {
            outputDiv.innerHTML = '<p style="color:red;">Введите хотя бы одно имя.</p>';
            return;
        }

        // Перемешиваем игроков
        players = shuffleArray(players);

        // Определяем количество команд
        const maxTeamSize = 6;

        // Если игроков достаточно, то команды по 6 человек
        let teams = [];
        if (players.length >= maxTeamSize * 2) {
            let teamCount = Math.floor(players.length / maxTeamSize);
            let remainingPlayers = players.slice(0, teamCount * maxTeamSize);

            for (let i = 0; i < teamCount; i++) {
                teams.push(remainingPlayers.slice(i * maxTeamSize, (i + 1) * maxTeamSize));
            }
        } else {
            // Иначе делим всех поровну между двумя командами
            const half = Math.ceil(players.length / 2);
            teams.push(players.slice(0, half));
            teams.push(players.slice(half));
        }

        // Выводим команды
        teams.forEach((team, index) => {
            const teamDiv = document.createElement('div');
            teamDiv.className = 'team';
            teamDiv.innerHTML = `<h3>Команда ${index + 1}</h3><ul>${team.map(player => `<li>${player}</li>`).join('')}</ul>`;
            outputDiv.appendChild(teamDiv);
        });
    }

    // Функция случайного перемешивания (алгоритм Фишера–Йетса)
    function shuffleArray(array) {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }
</script>

</body>
</html>
